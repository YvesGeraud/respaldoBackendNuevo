<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{asunto}}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background: #2c3e50;
        color: #fff;
        padding: 16px;
        text-align: center;
        border-radius: 8px 8px 0 0;
      }
      .content {
        background: #f9f9f9;
        padding: 24px;
        border: 1px solid #eee;
        border-top: none;
        border-radius: 0 0 8px 8px;
      }
      .footer {
        margin-top: 24px;
        font-size: 12px;
        color: #888;
        text-align: center;
      }
      a {
        color: #3498db;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1 style="margin: 0">Restaurante</h1>
    </div>
    <div class="content">{{contenido}}</div>
    <div class="footer">Este correo fue enviado automáticamente. Por favor no responder.</div>
  </body>
</html>
